# RHBK 26.4 — HA with Kubernetes DNS_PING (cache-stack kubernetes)
# Operator creates <name>-discovery headless Service and sets jgroups.dns.query
apiVersion: k8s.keycloak.org/v2alpha1
kind: Keycloak
metadata:
  name: rhbk-kc
  namespace: rhbk-kubeping
spec:
  instances: 3
  resources:
    requests:
      cpu: 500m
      memory: 896Mi
    limits:
      memory: 1536Mi
  additionalOptions:
    - name: cache
      value: ispn
    - name: cache-stack
      value: kubernetes
    - name: jgroups.dns.query
      value: rhbk-kc-discovery.rhbk-kubeping.svc.cluster.local
    - name: log-level
      value: info
    - name: log-category-org.jgroups
      value: debug
  db:
    vendor: postgres
    host: postgres-svc
    database: keycloak
    usernameSecret:
      name: keycloak-db-secret
      key: username
    passwordSecret:
      name: keycloak-db-secret
      key: password
  http:
    httpEnabled: true
  ingress:
    enabled: false
  hostname:
    hostname: https://keycloak-kubeping.apps-crc.testing
    admin: https://keycloak-kubeping.apps-crc.testing
    strict: false
    backchannelDynamic: true
  proxy:
    headers: xforwarded
  env:
    - name: JAVA_OPTS_APPEND
      value: >-
        -Djgroups.dns.query=rhbk-kc-discovery.rhbk-kubeping.svc.cluster.local
